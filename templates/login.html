<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>OSI — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 50%,#0f172a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.box{background:#fff;border-radius:20px;padding:42px 46px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,.35)}
.logo{text-align:center;margin-bottom:30px}
.logo .ico{font-size:3em;display:block;margin-bottom:8px}
.logo h1{font-size:1.45em;color:#0f172a;font-weight:800;margin-bottom:4px}
.logo p{color:#64748b;font-size:.84em}
.flbl{font-weight:600;font-size:.83em;color:#374151;display:block;margin-bottom:5px}
input{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:.92em;outline:none;margin-bottom:16px;transition:border .2s;font-family:inherit}
input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.btn{width:100%;background:linear-gradient(135deg,#3b82f6,#1e40af);color:#fff;border:none;padding:13px;border-radius:10px;font-size:.96em;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s}
.btn:hover{opacity:.9}
.err{background:#fef2f2;border:1px solid #fca5a5;color:#b91c1c;padding:11px 14px;border-radius:8px;font-size:.84em;margin-bottom:16px}
.div{text-align:center;color:#cbd5e1;margin:16px 0;font-size:.84em;position:relative}
.lnk{text-align:center;font-size:.85em;color:#64748b}
.lnk a{color:#3b82f6;font-weight:600;text-decoration:none}
.lnk a:hover{text-decoration:underline}
</style></head><body>
<div class="box">
  <div class="logo">
    <span class="ico">🧠</span>
    <h1>OSI Stress Assessment</h1>
    <p>Occupational Stress Index</p>
  </div>
  {% if error %}<div class="err">⚠ {{ error }}</div>{% endif %}
  <form method="POST">
    <label class="flbl">Username</label>
    <input type="text" name="username" placeholder="Enter your username" required autocomplete="username">
    <label class="flbl">Password</label>
    <input type="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
    <button class="btn" type="submit">Login →</button>
  </form>
  <div class="div">— or —</div>
  <div class="lnk">New user? <a href="/register">Create an account</a></div>
</div>
</body></html>
